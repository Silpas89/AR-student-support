<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>XR Study Environment App</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    .overlay {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="overlay">
  📊 Scan the marker → View Study Environment
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
>

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- MAIN PANEL -->
    <a-plane 
      position="0 1.2 0" 
      rotation="-90 0 0"
      width="2.5" 
      height="1.2"
      color="#111"
      opacity="0.85">

      <a-text 
        value="Study Environment"
        align="center"
        position="0 0.3 0.01"
        width="4"
        color="#00FFFF">
      </a-text>

      <a-text 
        value="Green: Good | Yellow: Medium | Red: Bad"
        align="center"
        position="0 -0.2 0.01"
        width="3"
        color="white">
      </a-text>

    </a-plane>

    <!-- COMFORT -->
    <a-box 
      position="-1 0.5 0"
      width="0.5" height="1.2" depth="0.5"
      color="#00FF88"
      animation="property: scale; to: 1 1.4 1; dir: alternate; loop: true; dur: 1500">
    </a-box>

    <a-text 
      value="Comfort"
      position="-1 1.3 0"
      align="center"
      color="white">
    </a-text>

    <!-- NOISE -->
    <a-cylinder 
      position="0 0.5 0"
      radius="0.3" height="1"
      color="#FF4444"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
    </a-cylinder>

    <a-text 
      value="Noise"
      position="0 1.3 0"
      align="center"
      color="white">
    </a-text>

    <!-- CROWD -->
    <a-sphere 
      position="1 0.5 0"
      radius="0.4"
      color="#FFD700"
      animation="property: position; to: 1 0.8 0; dir: alternate; loop: true; dur: 1200">
    </a-sphere>

    <a-text 
      value="Crowd"
      position="1 1.3 0"
      align="center"
      color="white">
    </a-text>

    <!-- RECOMMENDATION PANEL -->
    <a-plane 
      position="0 -0.5 0"
      rotation="-90 0 0"
      width="2"
      height="0.7"
      color="#222"
      opacity="0.9">

      <a-text 
        value="✔ Recommended for Study"
        align="center"
        position="0 0 0.01"
        color="#00FFAA">
      </a-text>

    </a-plane>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
