<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Student Decision Support System</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- Title Panel -->
    <a-plane position="0 1 0" rotation="-90 0 0" width="2" height="1" color="#222">
      <a-text value="Study Environment Analysis"
              align="center"
              position="0 0 0.1"
              color="white">
      </a-text>
    </a-plane>

    <!-- Comfort Level (Green Cube) -->
    <a-box position="-1 0.5 0"
           depth="0.5" height="1" width="0.5"
           color="green"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
    </a-box>

    <!-- Noise Level (Red Cylinder) -->
    <a-cylinder position="0 0.5 0"
                radius="0.3" height="1"
                color="red"
                animation="property: rotation; to: 360 0 0; loop: true; dur: 3000">
    </a-cylinder>

    <!-- Crowd Density (Yellow Sphere) -->
    <a-sphere position="1 0.5 0"
              radius="0.4"
              color="yellow"
              animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 1000">
    </a-sphere>

    <!-- Info Text -->
    <a-text value="Green = Comfortable\nRed = Noisy\nYellow = Crowded"
            position="0 -0.5 0"
            align="center"
            color="black">
    </a-text>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
