<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Study Environment</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: black;
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg,#0f2027,#203a43,#2c5364);
      z-index: 10;
    }

    .info-box {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.75);
      color: white;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .info-box h3 {
      margin: 5px 0;
    }

    .info-box small {
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="header">
  📍 Bangor AR Study Environment
</div>

<div class="info-box">
  <h3 id="statusText">Detecting location...</h3>
  <small id="locationText">Waiting...</small>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
>

  <a-marker preset="hiro"
            smooth="true"
            smoothCount="12"
            smoothTolerance="0.01"
            smoothThreshold="5">

    <!-- BASE -->
    <a-plane position="0 0 0"
             rotation="-90 0 0"
             width="2"
             height="1"
             color="#111"
             opacity="0.7">
    </a-plane>

    <!-- COMFORT -->
    <a-box id="comfortBar"
           position="-0.8 0.5 0"
           width="0.3"
           height="1"
           depth="0.3"
           color="#00ff88">
    </a-box>

    <a-text value="Comfort"
            position="-0.8 1.2 0"
            align="center"
            color="#00ffcc"
            look-at="[camera]">
    </a-text>

    <!-- NOISE -->
    <a-box id="noiseBar"
           position="0 0.5 0"
           width="0.3"
           height="1"
           depth="0.3"
           color="#ff4444">
    </a-box>

    <a-text value="Noise"
            position="0 1.2 0"
            align="center"
            color="#ff8888"
            look-at="[camera]">
    </a-text>

    <!-- CROWD -->
    <a-box id="crowdBar"
           position="0.8 0.5 0"
           width="0.3"
           height="1"
           depth="0.3"
           color="#ffd700">
    </a-box>

    <a-text value="Crowd"
            position="0.8 1.2 0"
            align="center"
            color="#ffee88"
            look-at="[camera]">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

let comfort = 6, noise = 5, crowd = 5;

// -------------------- DISTANCE --------------------
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2-lat1) * Math.PI/180;
  let dLon = (lon2-lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// -------------------- LOCATIONS --------------------
const library = {lat:53.2280, lon:-4.1290};
const canteen = {lat:53.2275, lon:-4.1280};

// -------------------- SIMULATION VARIATION --------------------
function vary(value){
  return Math.max(1, Math.min(10, value + (Math.random()*2 - 1)));
}

// -------------------- SET ENVIRONMENT --------------------
function setEnvironment(lat, lon) {

  let dLib = getDistance(lat, lon, library.lat, library.lon);
  let dCan = getDistance(lat, lon, canteen.lat, canteen.lon);

  let locText = document.getElementById("locationText");

  if(dLib < 0.05){
    comfort = 8; noise = 2; crowd = 3;
    locText.innerText = "📚 Library (Quiet)";
  }
  else if(dCan < 0.05){
    comfort = 4; noise = 8; crowd = 8;
    locText.innerText = "🍽️ Canteen (Busy)";
  }
  else{
    comfort = 6; noise = 5; crowd = 5;
    locText.innerText = "🏫 Campus (Moderate)";
  }

  updateBars();
  evaluate();
}

// -------------------- SCALE --------------------
function scale(v){
  return 0.2 + (v/10)*1.5;
}

// -------------------- ANIMATION --------------------
function animateBar(bar, height, x){
  bar.setAttribute("animation__height", {
    property: "height",
    to: height,
    dur: 600
  });

  bar.setAttribute("animation__pos", {
    property: "position",
    to: `${x} ${height/2} 0`,
    dur: 600
  });
}

// -------------------- UPDATE GRAPH --------------------
function updateBars(){

  let cBar = document.querySelector("#comfortBar");
  let nBar = document.querySelector("#noiseBar");
  let crBar = document.querySelector("#crowdBar");

  let cH = scale(comfort);
  let nH = scale(noise);
  let crH = scale(crowd);

  animateBar(cBar, cH, -0.8);
  animateBar(nBar, nH, 0);
  animateBar(crBar, crH, 0.8);
}

// -------------------- DECISION --------------------
function evaluate(){

  let score = comfort - noise - crowd;
  let text = document.getElementById("statusText");

  if(score >= 3){
    text.innerText = "✔ Good for Study";
    text.style.color = "#00ffaa";
  }
  else if(score >= 1){
    text.innerText = "⚠️ Moderate";
    text.style.color = "yellow";
  }
  else{
    text.innerText = "❌ Not Suitable";
    text.style.color = "red";
  }
}

// -------------------- LIVE GPS --------------------
navigator.geolocation.watchPosition(
  (pos) => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    setEnvironment(lat, lon);
  },
  (err) => console.log(err),
  { enableHighAccuracy: true }
);

// -------------------- CONTINUOUS UPDATE --------------------
setInterval(() => {

  // simulate small real-world changes
  comfort = vary(comfort);
  noise = vary(noise);
  crowd = vary(crowd);

  updateBars();
  evaluate();

}, 3000);

</script>

</body>
</html>
