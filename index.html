<!DOCTYPE html>
<html>
<head>
  <title>AR Student Decision Support System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #infoBox {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="infoBox">
  <b>AR Student Decision Support System</b><br>
  Point your camera at the HIRO marker.<br>
  Green = good, Yellow = moderate, Red = poor study condition.
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false">

  <a-marker preset="hiro">

    <!-- Base platform -->
    <a-box position="0 0 0" scale="3 0.1 2" color="#222222"></a-box>

    <!-- Title panel -->
    <a-text
      value="Study Space Analysis"
      position="-1.35 1.7 -0.8"
      rotation="-90 0 0"
      color="white"
      width="4">
    </a-text>

    <!-- Noise bar -->
    <a-box
      position="-0.9 0.45 0"
      scale="0.35 0.9 0.35"
      color="red"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-box>

    <a-text
      value="Noise: High"
      position="-1.25 1.05 0.45"
      rotation="-90 0 0"
      color="white"
      width="3">
    </a-text>

    <!-- Crowd bar -->
    <a-box
      position="0 0.3 0"
      scale="0.35 0.6 0.35"
      color="yellow">
    </a-box>

    <a-text
      value="Crowd: Medium"
      position="-0.45 0.9 0.45"
      rotation="-90 0 0"
      color="white"
      width="3">
    </a-text>

    <!-- Comfort bar -->
    <a-box
      position="0.9 0.65 0"
      scale="0.35 1.3 0.35"
      color="green">
    </a-box>

    <a-text
      value="Comfort: Good"
      position="0.45 1.4 0.45"
      rotation="-90 0 0"
      color="white"
      width="3">
    </a-text>

    <!-- Recommendation board -->
    <a-plane
      position="0 1.6 -0.75"
      rotation="-90 0 0"
      width="2.8"
      height="0.7"
      color="#003366">
    </a-plane>

    <a-text
      value="Recommendation: Suitable for short study, but not ideal for deep focus."
      position="-1.25 1.62 -0.73"
      rotation="-90 0 0"
      color="white"
      width="3">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

</body>
</html>
